{% extends "base.html" %}
{% block title %}ALDEA Console{% endblock %}

{% block content %}
<section class="chat-layout">
    <aside class="chat-sidebar glass-panel">
        <div class="panel-head">
            <h2>Saved Chats</h2>
            <button id="newChatBtn" class="btn btn-silver">New</button>
        </div>
        <div class="panel-actions">
            <button id="saveChatBtn" class="btn btn-green">Save Current Chat</button>
        </div>
        <ul id="chatList" class="chat-list"></ul>
    </aside>

    <section class="chat-main glass-panel">
        <header class="chat-head">
            <h2>Live Conversation</h2>
            <div class="status-badges">
                <span class="badge">Model: {{ settings.llm.model }}</span>
                <span class="badge">Context: {{ settings.llm.context_window }}</span>
                <span id="wakeWordBadge" class="badge wake-word-badge wake-state-off" aria-live="polite">
                    <span class="wake-dot" aria-hidden="true"></span>
                    <span id="wakeWordLabel">Wake Word: OFF</span>
                </span>
                <span id="toolActivityBadge" class="badge tool-activity-badge tool-state-idle" aria-live="polite">
                    <span class="tool-dot" aria-hidden="true"></span>
                    <span id="toolActivityLabel">Tools idle</span>
                </span>
            </div>
        </header>

        <div id="chatMessages" class="chat-messages"></div>

        <form id="chatForm" class="chat-compose">
            <div class="compose-avatar-wrap">
                <img id="userAvatar" class="compose-avatar" src="{{ settings.ui.user_avatar }}" alt="User avatar" referrerpolicy="no-referrer">
            </div>
            <div class="compose-controls">
                <textarea id="chatInput" rows="3" placeholder="Type your message. Shift+Enter for new line." required></textarea>
                <div class="compose-actions">
                    <button type="button" id="transcribeSpeechToggle" class="toggle-switch" role="switch" aria-checked="false" aria-label="Transcribe Speech">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-label">Transcribe Speech</span>
                    </button>
                    <button type="button" id="speakRepliesToggle" class="toggle-switch" role="switch" aria-checked="false" aria-label="Speak Replies">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-label">Speak Replies</span>
                    </button>
                    <button type="button" id="stopTtsBtn" class="btn btn-danger" disabled>Stop Audio</button>
                    <button type="submit" class="btn btn-green">Send</button>
                </div>
            </div>
        </form>
    </section>
</section>
{% endblock %}
